<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #25f4ee;
      color: #000;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 10px;
    }
    button:hover {
      background-color: #00d4cc;
    }
    button:active {
      background-color: #00b8ad;
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 10px;
      padding: 10px;
      background-color: #fff;
      border-radius: 4px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }
    #details {
      margin-top: 10px;
      padding: 8px;
      background-color: #fff;
      border-radius: 4px;
      text-align: center;
      font-size: 12px;
      color: #999;
      line-height: 1.5;
    }
    .options {
      margin-top: 10px;
      padding: 10px;
      background-color: #fff;
      border-radius: 4px;
      border: 1px solid #ddd;
    }
    .option-label {
      display: flex;
      align-items: center;
      font-size: 13px;
      color: #333;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .option-label input[type="checkbox"] {
      margin-right: 8px;
      cursor: pointer;
      width: 16px;
      height: 16px;
    }
    .option-label:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="options">
    <label class="option-label">
      <input type="checkbox" id="unfollowFollowing" checked>
      <span>Unfollow "Following"</span>
    </label>
    <label class="option-label">
      <input type="checkbox" id="unfollowFriend">
      <span>Unfollow "Friend"</span>
    </label>
  </div>

  <button id="unfollowBtn">Start Auto Unfollow</button>
  <div id="status">Ready</div>
  <div id="details"></div>

  <script src="popup.js"></script>
</body>
</html>
